[force_move]
enable_force_move: True

[gcode_macro G31]
description: Clear PLR state and reset interruption flag
gcode:
  RUN_SHELL_COMMAND CMD=clear_plr
  SAVE_VARIABLE VARIABLE=was_interrupted VALUE=False

[gcode_macro save_last_file]
description: Save the current virtual SD file for power-loss resume
gcode:
  {% set filepath = printer.virtual_sdcard.file_path|default("")|string %}
  {% if filepath|length > 0 %}
    {% set parts = filepath.split('/') %}
    SAVE_VARIABLE VARIABLE=last_file VALUE='"{ parts[-1] }"'
    SAVE_VARIABLE VARIABLE=filepath VALUE='"{ filepath }"'
    RESPOND TYPE=echo MSG="PLR: Datei gespeichert: {parts[-1]}"
  {% else %}
    RESPOND TYPE=echo MSG="PLR: Keine virtuelle SD-Datei aktiv - save_last_file übersprungen"
  {% endif %}

[gcode_macro clear_last_file]
description: Clear the saved power-loss resume state
gcode:
  SAVE_VARIABLE VARIABLE=last_file VALUE='""'
  SAVE_VARIABLE VARIABLE=filepath VALUE='""'
  SAVE_VARIABLE VARIABLE=power_resume_z VALUE=-1.0

[gcode_macro RESUME_INTERRUPTED]
description: Resume the last interrupted print from saved PLR data
gcode:
  {% set saved = printer.save_variables.variables %}
  {% set z_height = params.Z_HEIGHT|default(saved.power_resume_z|default(-1))|float %}
  {% set last_file = params.GCODE_FILE|default(saved.last_file|default(""))|string %}

  {% if last_file|length == 0 %}
    RESPOND TYPE=error MSG="PLR: Keine zuletzt gedruckte Datei gespeichert."
  {% elif z_height < 0 %}
    RESPOND TYPE=error MSG="PLR: Keine gültige Z-Höhe gespeichert. LOG_Z fehlt wahrscheinlich."
  {% else %}
    RESPOND TYPE=echo MSG="PLR: Wiederaufnahme von {last_file} bei Z={z_height}"
    SET_KINEMATIC_POSITION X=0
    SET_KINEMATIC_POSITION Y=0
    SET_KINEMATIC_POSITION Z=0
    RUN_SHELL_COMMAND CMD=POWER_LOSS_RESUME PARAMS="{z_height} \"{last_file}\""
    SDCARD_PRINT_FILE FILENAME="plr/{last_file}"
  {% endif %}

[gcode_macro LOG_Z]
description: Save the current Z position for PLR
gcode:
  {% set z_pos = printer.gcode_move.gcode_position.z %}
  SAVE_VARIABLE VARIABLE=power_resume_z VALUE={z_pos}
