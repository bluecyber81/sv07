# X Axis (Speed + Performance)
[autotune_tmc stepper_x]
motor: ldo-42sth48-2504ah
tuning_goal: performance
extra_hysteresis: 0
tbl: 1
toff: 2
sgt: 1
sg4_thrs: 90
voltage: 24


# Y Axis (Speed + Performance)
[autotune_tmc stepper_y]
motor: ldo-42sth48-2504ah
tuning_goal: performance
extra_hysteresis: 0
tbl: 1
toff: 2
sgt: 1
sg4_thrs: 90
voltage: 24


# Extruder
[autotune_tmc extruder]
motor: ldo-42sth40-1684ac
tuning_goal: silent
extra_hysteresis: 1
tbl: 1
toff: 1
sgt: 1
sg4_thrs: 80
voltage: 24
overvoltage_vth: 0.0



# SV07 Plus - klipper_tmc_autotune config
# Basierend auf deinen Motoraufklebern:
# X / Z / Z1: Shengyang 42BYGH1634-A-20DB
# Y:          Shengyang 42BYGH3031-A-24DH
# Extruder:   LDO-42STH40-1684AC
#
# WICHTIG:
# - Die Extruder-Daten sind exakt aus der offiziellen motor_database.cfg.
# - Die Shengyang-Werte sind bewusst plausible Schätzwerte aus 42BYGH-Familiendaten,
#   weil für genau diese Varianten keine vollständigen öffentlichen Datenblätter auffindbar waren.
# - X/Y verwenden sg4_thrs: 95, damit dein vorhandenes sensorless homing erhalten bleibt.
# - Z / Z1 autotune funktioniert erst, wenn in printer.cfg auch
#   [tmc2209 stepper_z] und [tmc2209 stepper_z1] vorhanden sind.

# ----------------------------
# geschätzte Motor-Konstanten
# ----------------------------

[motor_constants sv07plus_1634_guess]
# Shengyang 42BYGH1634-A-20DB
# 34 mm Motorfamilie; Schätzwert aus 42BYGH34-Familie
resistance: 3.2
inductance: 0.0038
holding_torque: 0.32
max_current: 1.2
steps_per_revolution: 200

[motor_constants sv07plus_3031_guess]
# Shengyang 42BYGH3031-A-24DH
# kürzerer Y-Motor; Schätzwert zwischen typischen 31/32-mm 42BYGH-Daten
resistance: 3.4
inductance: 0.0026
holding_torque: 0.24
max_current: 1.0
steps_per_revolution: 200

# ----------------------------
# autotune sections
# ----------------------------

[autotune_tmc stepper_x]
motor: sv07plus_1634_guess
tuning_goal: performance
sg4_thrs: 95
voltage: 24

[autotune_tmc stepper_y]
motor: sv07plus_3031_guess
tuning_goal: performance
sg4_thrs: 95
voltage: 24

[autotune_tmc stepper_z]
motor: sv07plus_1634_guess
tuning_goal: silent
extra_hysteresis: 1
voltage: 24

[autotune_tmc stepper_z1]
motor: sv07plus_1634_guess
tuning_goal: silent
extra_hysteresis: 1
voltage: 24

[autotune_tmc extruder]
# exakter Datenbankeintrag aus klipper_tmc_autotune
motor: ldo-42sth40-1684ac
tuning_goal: silent
extra_hysteresis: 1
voltage: 24
overvoltage_vth: 0.0

# ----------------------------
# empfohlene Ausführung
# ----------------------------
# RESTART
# AUTOTUNE_TMC STEPPER=stepper_x
# AUTOTUNE_TMC STEPPER=stepper_y
# AUTOTUNE_TMC STEPPER=extruder
# AUTOTUNE_TMC STEPPER=stepper_z
# AUTOTUNE_TMC STEPPER=stepper_z1
# SAVE_CONFIG
