# Central location for external shell commands used by Klipper macros.

[gcode_shell_command clear_plr]
command: sh /home/mks/clear_plr.sh
timeout: 5.
verbose: False

[gcode_shell_command POWER_LOSS_RESUME]
command: /home/mks/plr.sh
timeout: 420.
verbose: False

[gcode_shell_command beep]
command: bash /home/mks/printer_data/config/macro/macro_beep.sh
timeout: 10.
verbose: False

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh $0"
timeout: 90.0
verbose: True
