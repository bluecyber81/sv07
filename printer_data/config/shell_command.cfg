# Central location for external shell commands used by Klipper macros.
# Keep paths explicit and keep noisy debug output disabled unless needed.
# Hinweis: RUN_SHELL_COMMAND haengt PARAMS direkt an den command an.

[gcode_shell_command clear_plr]
command: bash /home/mks/printer_data/config/clear_plr.sh
timeout: 5.0
verbose: False

[gcode_shell_command POWER_LOSS_RESUME]
command: bash /home/mks/printer_data/config/plr.sh
timeout: 420.0
verbose: False

[gcode_shell_command beep]
command: bash /home/mks/printer_data/config/macro/macro_beep.sh
timeout: 10.0
verbose: False

[gcode_shell_command update_git_script]
command: bash /home/mks/klipper-backup/script.sh
timeout: 90.0
verbose: False

# MESSAGE wird ueber RUN_SHELL_COMMAND ... PARAMS=... direkt als Script-Argument uebergeben.
[gcode_shell_command update_git_script_message]
command: bash /home/mks/klipper-backup/script.sh
timeout: 90.0
verbose: False
