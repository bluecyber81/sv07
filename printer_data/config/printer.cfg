# SV07 Plus - moderne stabile printer.cfg
# Basis: deine aktuelle funktionierende Config, strukturell aufgeraeumt und Makros verbessert.
#
# Aktiver Startweg:
# - KPA_PRINT_START -> _Pre_Print_Procedure
# - PRINT_START und START_PRINT sind Aliase auf KPA_PRINT_START
# - _PRINT_START_CORE bleibt als Fallback-Makro erhalten, ist aber nicht der Standard-Startweg.
#
# PLR / Power-Loss-Resume:
# - plr.cfg wird extern eingebunden.
# - G31 bleibt bewusst erhalten. Es loescht den PLR-Status via clear_plr
#   und setzt was_interrupted=False. G31 bewegt keine Achsen.
# - Beim erfolgreichen KPA_PRINT_START werden was_interrupted=True und
#   print_is_running_f=True gesetzt. PRINT_END/CANCEL_PRINT setzen
#   print_is_running_f wieder sauber auf False.
# - RESUME_INTERRUPTED liegt in plr.cfg. Dieses Makro nutzt in deinem PLR-Workflow
#   SET_KINEMATIC_POSITION. Das ist nur fuer den speziellen PLR-Resume gedacht
#   und darf nicht als normales Resume/Pause-Makro missverstanden werden.
# - PLR-Resume nur verwenden, wenn last_file und power_resume_z gueltig gespeichert sind.
#
# BTT SFS V2.0:
# - Der Sensor wird beim Klipper-Start deaktiviert.
# - Aktivierung erfolgt erst im Druckstart nach Purge/Startvorbereitung.
# - Deaktivierung erfolgt bei PRINT_END und CANCEL_PRINT.
#
# Externe Abhaengigkeiten bleiben erhalten:
# - shell_command.cfg, plr.cfg, timelapse.cfg
# - printer_additions/___module_loader.cfg, autotune_tmc.cfg
# - printer_additions/kpa_leds_sv07plus_module.cfg
#
# SAVE_CONFIG Block wurde uebernommen.

#############################################################################################################
# 00 - INCLUDES
#############################################################################################################

[include shell_command.cfg]

# PLR-Makros werden aus plr.cfg geladen.
# Wichtig: RESUME_INTERRUPTED dort ist ein Power-Loss-Resume-Notfallmakro.
# Es darf nur genutzt werden, wenn last_file und power_resume_z korrekt gespeichert sind.
# G31 aus plr.cfg ist dagegen unkritisch: Es loescht nur PLR-Status und setzt was_interrupted=False.
# Diese printer.cfg setzt zusaetzlich print_is_running_f bei Start/Ende/Cancel eindeutig.
[include plr.cfg]

[include timelapse.cfg]
[include printer_additions/___module_loader.cfg]
[include autotune_tmc.cfg]
[include printer_additions/kpa_leds_sv07plus_module.cfg]

#############################################################################################################
# 10 - SYSTEM / CORE
#############################################################################################################

[virtual_sdcard]
path: /home/mks/printer_data/gcodes
on_error_gcode:
  CANCEL_PRINT

[exclude_object]

[save_variables]
filename: ~/printer_data/config/saved_variables.cfg

[firmware_retraction]
retract_length: 0.6
retract_speed: 60
unretract_speed: 60

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[mcu rpi]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: cartesian
max_velocity: 350
max_accel: 10000
minimum_cruise_ratio: 0.5
max_z_velocity: 15
max_z_accel: 200
square_corner_velocity: 7

[pause_resume]
recover_velocity: 50.0

[display_status]

[respond]

[idle_timeout]
timeout: 600
gcode:
  {% if printer.pause_resume.is_paused %}
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=idle_state VALUE=1
    TURN_OFF_HEATERS
    RESPOND TYPE=echo MSG="Idle timeout waehrend Pause - Hotend aus, Motoren bleiben an"
  {% else %}
    TURN_OFF_HEATERS
    M84
    RESPOND TYPE=echo MSG="Idle timeout - heaters off"
  {% endif %}

#############################################################################################################
# 20 - TUNING / MESSUNG / SHAPER
#############################################################################################################

[adxl345]
cs_pin: rpi:None
spi_bus: spidev0.0

[verify_heater extruder]
max_error: 60
check_gain_time: 20
hysteresis: 5
heating_gain: 2

[verify_heater heater_bed]
max_error: 120
check_gain_time: 60
hysteresis: 5
heating_gain: 2

[resonance_tester]
accel_chip: adxl345
probe_points:
  150, 150, 20
accel_per_hz: 110
min_freq: 1
max_freq: 100
max_smoothing: 0.2
hz_per_sec: 1

[input_shaper]
damping_ratio_x: 0.08
damping_ratio_y: 0.10

[skew_correction]

#############################################################################################################
# 30 - CLIENT / PAUSE / RESUME / CANCEL
#############################################################################################################

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos: True
variable_custom_park_x: 10.0
variable_custom_park_y: 290.0
variable_custom_park_dz: 10.0
variable_retract: 1.0
variable_speed_retract: 35.0
variable_unretract: 1.0
variable_speed_unretract: 35.0
variable_speed_hop: 15.0
variable_speed_move: 100.0
variable_park_at_cancel: True
variable_park_at_cancel_x: 10.0
variable_park_at_cancel_y: 290.0
variable_use_fw_retract: False
variable_idle_timeout: 1800
variable_require_motion_sensor_on_resume: False
variable_runout_sensor: "filament_switch_sensor my_sensor"
variable_user_pause_macro: ""
variable_user_resume_macro: ""
variable_user_cancel_macro: ""
gcode:

[gcode_macro CANCEL_PRINT]
description: Cancel with PLR cleanup, sensor cleanup and safe parking
rename_existing: CANCEL_PRINT_BASE
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set allow_park = client.park_at_cancel|default(false)|string|lower == 'true' %}
  {% set park_x = "X=" ~ client.park_at_cancel_x if (client.park_at_cancel_x|default(none) is not none) else "" %}
  {% set park_y = "Y=" ~ client.park_at_cancel_y if (client.park_at_cancel_y|default(none) is not none) else "" %}

  # G31 aus plr.cfg: PLR-Status loeschen und was_interrupted auf False setzen
  G31
  SAVE_VARIABLE VARIABLE=print_is_running_f VALUE=False
  clear_last_file
  SFS_DISABLE
  M400

  {% if printer['gcode_macro RESUME'].restore_idle_timeout|default(0)|int > 0 %}
    SET_IDLE_TIMEOUT TIMEOUT={printer['gcode_macro RESUME'].restore_idle_timeout}
  {% endif %}

  {% if allow_park and "xyz" in printer.toolhead.homed_axes %}
    _TOOLHEAD_PARK_PAUSE_CANCEL {park_x} {park_y}
  {% elif "xyz" not in printer.toolhead.homed_axes %}
    {action_respond_info("Drucker nicht gehomed - Parkposition bei CANCEL_PRINT übersprungen")}
  {% endif %}

  TURN_OFF_HEATERS
  M107
  SET_SKEW CLEAR=1
  {client.user_cancel_macro|default("")}
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=idle_state VALUE=0
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_idle_timeout VALUE=0
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_extruder_temp VALUE=0
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_extruder_temp_target VALUE=0
  SET_PAUSE_NEXT_LAYER ENABLE=0
  SET_PAUSE_AT_LAYER ENABLE=0 LAYER=0
  CANCEL_PRINT_BASE
  RESPOND TYPE=echo MSG="Cancel Print Success!"
  M84 X Y E

[gcode_macro PAUSE]
description: Pause with parking, stored temperatures and timeout handling
rename_existing: PAUSE_BASE
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set pause_idle_timeout = client.idle_timeout|default(0)|int %}
  {% set has_extruder = printer.toolhead.extruder != '' %}
  {% set temp = printer[printer.toolhead.extruder].target if has_extruder else 0 %}
  {% set restore_temp = 1 if (has_extruder and params.RESTORE|default(1)|int == 1) else 0 %}
  {% set default_idle_timeout = printer.configfile.settings.idle_timeout.timeout|default(600)|int %}

  {% if printer.pause_resume.is_paused %}
    RESPOND TYPE=echo MSG="PAUSE ignoriert - Druck ist bereits pausiert"
  {% else %}
    RESPOND TYPE=echo MSG="⏸️ Pause Print!"
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_extruder_temp VALUE={restore_temp}
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_extruder_temp_target VALUE={temp}

    {% if pause_idle_timeout > 0 %}
      SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_idle_timeout VALUE={default_idle_timeout}
      SET_IDLE_TIMEOUT TIMEOUT={pause_idle_timeout}
    {% else %}
      SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_idle_timeout VALUE=0
    {% endif %}

    PAUSE_BASE
    {client.user_pause_macro|default("")}
    _TOOLHEAD_PARK_PAUSE_CANCEL {rawparams}
  {% endif %}

[gcode_macro RESUME]
description: Resume with hotend, switch sensor and optional motion sensor checks
rename_existing: RESUME_BASE
variable_restore_extruder_temp: 0
variable_restore_extruder_temp_target: 0
variable_restore_idle_timeout: 0
variable_idle_state: 0
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set velocity = printer.configfile.settings.pause_resume.recover_velocity|default(50.0)|float %}
  {% set sp_move = client.speed_move|default(velocity)|float %}
  {% set can_extrude = True if printer.toolhead.extruder == '' else printer[printer.toolhead.extruder].can_extrude %}
  {% set fs = printer["filament_switch_sensor my_sensor"] %}
  {% set ms = printer["filament_motion_sensor encoder_sensor"] %}
  {% set switch_ok = (not fs.enabled) or fs.filament_detected %}
  {% set motion_ok = (not ms.enabled) or ms.filament_detected %}
  {% set require_motion = client.require_motion_sensor_on_resume|default(false)|string|lower == 'true' %}
  {% set is_paused = printer.pause_resume.is_paused %}
  {% set from_idle = printer.idle_timeout.state|upper == "IDLE" or idle_state|int == 1 %}
  {% set do_resume = 0 %}

  RESPOND TYPE=echo MSG="▶️ RESUME Print!"

  {% if not is_paused and not from_idle %}
    RESPOND TYPE=echo MSG="RESUME ignoriert - Druck ist nicht pausiert"
  {% else %}

    {% if from_idle %}
      SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=idle_state VALUE=0
      {% if restore_extruder_temp|int == 1 %}
        RESPOND TYPE=echo MSG='{"Stelle %s wieder auf %3.1f°C ein" % (printer.toolhead.extruder, restore_extruder_temp_target)}'
        M109 S{restore_extruder_temp_target}
        {% set do_resume = 1 %}
      {% elif can_extrude %}
        {% set do_resume = 1 %}
      {% else %}
        RESPOND TYPE=error MSG='{"Resume abgebrochen: %s ist nicht heiß genug" % printer.toolhead.extruder}'
      {% endif %}
    {% elif can_extrude %}
      {% set do_resume = 1 %}
    {% else %}
      RESPOND TYPE=error MSG='{"Resume abgebrochen: %s ist nicht heiß genug" % printer.toolhead.extruder}'
    {% endif %}

    {% if not switch_ok %}
      RESPOND TYPE=error MSG="Resume abgebrochen: Filament-Switch erkennt kein Filament."
    {% elif require_motion and not motion_ok %}
      RESPOND TYPE=error MSG="Resume abgebrochen: Motion-Sensor meldet keine Filamentbewegung / mögliche Verstopfung."
    {% else %}

      {% if not motion_ok and ms.enabled %}
        RESPOND TYPE=echo MSG="Hinweis: Motion-Sensor meldet aktuell keine Bewegung - Resume wird trotzdem ausgeführt"
      {% endif %}

      {% if do_resume|int == 1 %}
        {% if restore_idle_timeout|int > 0 %}
          SET_IDLE_TIMEOUT TIMEOUT={restore_idle_timeout}
          SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_idle_timeout VALUE=0
        {% endif %}

        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_extruder_temp VALUE=0
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_extruder_temp_target VALUE=0

        {client.user_resume_macro|default("")}
        _CLIENT_EXTRUDE
        RESUME_BASE VELOCITY={params.VELOCITY|default(sp_move)}
      {% endif %}
    {% endif %}
  {% endif %}

[gcode_macro SET_PAUSE_NEXT_LAYER]
description: Enable or disable a pause on the next layer change
gcode:
  {% set stats = printer['gcode_macro SET_PRINT_STATS_INFO'] %}
  {% set enable = 1 if params.ENABLE|default(1)|int != 0 else 0 %}
  {% set macro_name = params.MACRO|default(stats.pause_next_layer_call, true)|string %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_next_layer_enabled VALUE={enable}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_next_layer_call VALUE="'{macro_name}'"
  RESPOND TYPE=echo MSG="{% if enable == 1 %}Pause beim nächsten Layer aktiviert ({macro_name}){% else %}Pause beim nächsten Layer deaktiviert{% endif %}"

[gcode_macro SET_PAUSE_AT_LAYER]
description: Enable or disable a pause at a specific layer
gcode:
  {% set stats = printer['gcode_macro SET_PRINT_STATS_INFO'] %}
  {% set enable = 1 if (params.ENABLE|int != 0 if params.ENABLE is defined else params.LAYER is defined) else 0 %}
  {% set layer = params.LAYER|default(stats.pause_at_layer_layer)|int %}
  {% set macro_name = params.MACRO|default(stats.pause_at_layer_call, true)|string %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_at_layer_enabled VALUE={enable}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_at_layer_layer VALUE={layer}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_at_layer_call VALUE="'{macro_name}'"
  RESPOND TYPE=echo MSG="{% if enable == 1 %}Pause bei Layer {layer} aktiviert ({macro_name}){% else %}Pause bei Layer deaktiviert{% endif %}"

[gcode_macro SET_PRINT_STATS_INFO]
rename_existing: SET_PRINT_STATS_INFO_BASE
description: Hook for pause at next layer / pause at layer
variable_pause_next_layer_enabled: 0
variable_pause_next_layer_call: "PAUSE"
variable_pause_at_layer_enabled: 0
variable_pause_at_layer_layer: 0
variable_pause_at_layer_call: "PAUSE"
gcode:
  {% if pause_next_layer_enabled|int == 1 %}
    RESPOND TYPE=echo MSG='{"%s, ausgelöst durch pause_next_layer" % pause_next_layer_call}'
    {pause_next_layer_call}
    SET_PAUSE_NEXT_LAYER ENABLE=0
  {% elif pause_at_layer_enabled|int == 1 and params.CURRENT_LAYER is defined and params.CURRENT_LAYER|int == pause_at_layer_layer|int %}
    RESPOND TYPE=echo MSG='{"%s, ausgelöst durch pause_at_layer [%d]" % (pause_at_layer_call, pause_at_layer_layer)}'
    {pause_at_layer_call}
    SET_PAUSE_AT_LAYER ENABLE=0 LAYER=0
  {% endif %}
  SET_PRINT_STATS_INFO_BASE {rawparams}

[gcode_macro _TOOLHEAD_PARK_PAUSE_CANCEL]
description: Park helper for PAUSE and CANCEL_PRINT
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set velocity = printer.configfile.settings.pause_resume.recover_velocity|default(50.0)|float %}
  {% set use_custom = client.use_custom_pos|default(false)|string|lower == 'true' %}
  {% set custom_park_x = client.custom_park_x|default(0.0)|float %}
  {% set custom_park_y = client.custom_park_y|default(0.0)|float %}
  {% set park_dz = client.custom_park_dz|default(2.0)|float|abs %}
  {% set sp_hop = client.speed_hop|default(15)|float * 60 %}
  {% set sp_move = client.speed_move|default(velocity)|float * 60 %}
  {% set origin = printer.gcode_move.homing_origin %}
  {% set act = printer.gcode_move.gcode_position %}
  {% set max = printer.toolhead.axis_maximum %}
  {% set cone = printer.toolhead.cone_start_z|default(max.z) %}
  {% set round_bed = printer.configfile.settings.printer.kinematics in ['delta', 'polar', 'rotary_delta', 'winch'] %}
  {% set z_min = params.Z_MIN|default(0)|float %}
  {% set z_park = [[(act.z + park_dz), z_min]|max, (max.z - origin.z)]|min %}
  {% set x_park = params.X if params.X is defined else custom_park_x if use_custom else 0.0 if round_bed else (max.x - 5.0) %}
  {% set y_park = params.Y if params.Y is defined else custom_park_y if use_custom else (max.y - 5.0) if round_bed and z_park < cone else 0.0 if round_bed else (max.y - 5.0) %}

  {% if printer.toolhead.extruder != '' and printer[printer.toolhead.extruder].can_extrude %}
    _CLIENT_RETRACT
  {% else %}
    RESPOND TYPE=echo MSG="Retract bei PAUSE/CANCEL übersprungen - Düse zu kalt"
  {% endif %}

  {% if "xyz" in printer.toolhead.homed_axes %}
    G90
    G1 Z{z_park} F{sp_hop}
    G1 X{x_park} Y{y_park} F{sp_move}
    {% if not printer.gcode_move.absolute_coordinates %}
      G91
    {% endif %}
  {% else %}
    RESPOND TYPE=echo MSG="Drucker nicht gehomed"
  {% endif %}

[gcode_macro _CLIENT_EXTRUDE]
description: Extrudes if the extruder is hot enough
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set use_fw_retract = (client.use_fw_retract|default(false)|string|lower == 'true') and (printer.firmware_retraction is defined) %}
  {% set length = params.LENGTH|default(client.unretract)|default(1.0)|float %}
  {% set speed = params.SPEED|default(client.speed_unretract)|default(35)|float %}
  {% set absolute_extrude = printer.gcode_move.absolute_extrude %}

  {% if printer.toolhead.extruder != '' %}
    {% if printer[printer.toolhead.extruder].can_extrude %}
      {% if use_fw_retract %}
        {% if length < 0 %}
          G10
        {% else %}
          G11
        {% endif %}
      {% else %}
        M83
        G1 E{length} F{speed|abs * 60}
        {% if absolute_extrude %}
          M82
        {% endif %}
      {% endif %}
    {% else %}
      RESPOND TYPE=echo MSG='{"%s nicht heiß genug" % printer.toolhead.extruder}'
    {% endif %}
  {% endif %}

[gcode_macro _CLIENT_RETRACT]
description: Retracts if the extruder is hot enough
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set length = params.LENGTH|default(client.retract)|default(1.0)|float %}
  {% set speed = params.SPEED|default(client.speed_retract)|default(35)|float %}
  _CLIENT_EXTRUDE LENGTH=-{length|abs} SPEED={speed|abs}

#############################################################################################################
# 40 - PRINT START / PRINT END
#############################################################################################################

[gcode_macro _PRINT_START_CORE]
description: Legacy fallback start sequence without KPA pre-print flow
gcode:
  {% set BED = params.BED|default(params.BED_TEMP|default(60))|float %}
  {% set EXTRUDER = params.EXTRUDER|default(params.EXTRUDER_TEMP|default(params.HOTEND_TEMP|default(200)))|float %}
  {% set ADAPTIVE_MESH = params.ADAPTIVE_MESH|default(params.ADAPTIVE|default(1))|int %}
  {% set ADAPTIVE_MARGIN = params.ADAPTIVE_MARGIN|default(8)|float %}
  {% set MESH_MODE = params.MESH|default("adaptive")|string|lower %}
  {% set default_pa = printer.configfile.settings.extruder.pressure_advance|default(0.025)|float %}
  {% set default_pa_smooth = printer.configfile.settings.extruder.pressure_advance_smooth_time|default(0.035)|float %}
  {% set pressure_advance = params.PRESSURE_ADVANCE|default(params.PA|default(default_pa))|float %}
  {% set pa_smooth_time = params.PA_SMOOTH_TIME|default(default_pa_smooth)|float %}
  {% set skew_profile = params.SKEW_PROFILE|default(none) %}

  RESPOND TYPE=echo MSG="PRINT_START: Bett={BED}°C / Düse={EXTRUDER}°C"

  CLEAR_PAUSE
  SET_PAUSE_NEXT_LAYER ENABLE=0
  SET_PAUSE_AT_LAYER ENABLE=0 LAYER=0
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=idle_state VALUE=0
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_idle_timeout VALUE=0
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_extruder_temp VALUE=0
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_extruder_temp_target VALUE=0

  clear_last_file
  save_last_file

  SFS_DISABLE
  BED_MESH_CLEAR
  SET_SKEW CLEAR=1
  G90
  M83

  M140 S{BED}
  M104 S150

  # KPAD_HOME kommt aus den eingebundenen KPA/Addition-Modulen.
  # Ohne diese Includes muss hier alternativ G28 verwendet werden.
  KPAD_HOME
  M190 S{BED}
  # G31 aus plr.cfg: alten PLR-Status loeschen und was_interrupted auf False setzen
  G31
  Z_TILT_ADJUST
  G28 Z

  _BED_MESH_SMART MODE={MESH_MODE} ADAPTIVE={ADAPTIVE_MESH} ADAPTIVE_MARGIN={ADAPTIVE_MARGIN}

  M104 S{EXTRUDER}
  M109 S{EXTRUDER}

  G92 E0
  G1 Z10 F900
  G1 X5 Y10 F6000
  G1 Z0.28 F600
  G1 X180 E15 F1200
  G1 X220 F6000
  G1 X285 E10 F1200
  G92 E0

  SET_PRESSURE_ADVANCE ADVANCE={pressure_advance} SMOOTH_TIME={pa_smooth_time}
  {% if skew_profile is not none and skew_profile|string|lower != "off" %}
    SKEW_PROFILE LOAD={skew_profile}
  {% endif %}

  # Druckstatus fuer PLR/KPA eindeutig setzen: ab hier beginnt der eigentliche Druck.
  SAVE_VARIABLE VARIABLE=was_interrupted VALUE=True
  SAVE_VARIABLE VARIABLE=print_is_running_f VALUE=True

  SFS_ENABLE
  RESPOND TYPE=echo MSG="PRINT_START fertig"

[gcode_macro KPA_PRINT_START]
description: KPA start with PLR, SFS, pressure advance and optional skew profile
gcode:
  {% set psv = printer.save_variables.variables %}
  {% set print_running = psv.print_is_running_f|default(false)|string|lower == 'true' %}
  {% set was_interrupted = psv.was_interrupted|default(false)|string|lower == 'true' %}
  {% set resuming = print_running and was_interrupted %}

  {% set bed_temp = params.BED_TEMP|default(params.BED|default(params.BED_TEMPERATURE|default(none))) %}
  {% set extruder_temp = params.EXTRUDER_TEMP|default(params.EXTRUDER|default(params.HOTEND_TEMP|default(params.NOZZLE_TEMP|default(none)))) %}
  {% set fila_type = params.FILA_TYPE|default(params.FILAMENT_TYPE|default(none)) %}
  {% set noz_dia = params.NOZ_DIA|default(params.NOZZLE_DIAMETER|default(none)) %}
  {% set layer_h = params.LAYER_H|default(params.LAYER_HEIGHT|default(none)) %}
  {% set layer_c = params.LAYER_C|default(params.TOTAL_LAYER|default(none)) %}
  {% set model_h = params.MODEL_H|default(params.MODEL_HEIGHT|default(none)) %}
  {% set area_start = params.AREA_START|default(none) %}
  {% set area_end = params.AREA_END|default(none) %}
  {% set default_pa = printer.configfile.settings.extruder.pressure_advance|default(0.025)|float %}
  {% set default_pa_smooth = printer.configfile.settings.extruder.pressure_advance_smooth_time|default(0.035)|float %}
  {% set pressure_advance = params.PRESSURE_ADVANCE|default(params.PA|default(default_pa))|float %}
  {% set pa_smooth_time = params.PA_SMOOTH_TIME|default(default_pa_smooth)|float %}
  {% set skew_profile = params.SKEW_PROFILE|default(none) %}

  CLEAR_PAUSE
  SET_PAUSE_NEXT_LAYER ENABLE=0
  SET_PAUSE_AT_LAYER ENABLE=0 LAYER=0
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=idle_state VALUE=0
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_idle_timeout VALUE=0
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_extruder_temp VALUE=0
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_extruder_temp_target VALUE=0

  SFS_DISABLE
  SET_SKEW CLEAR=1

  {% if resuming %}
    RESPOND TYPE=echo MSG="KPA_PRINT_START: PLR/KPA Resume erkannt - gespeicherte Daten bleiben erhalten"
  {% else %}
    clear_last_file
    save_last_file
    G31
  {% endif %}

  {% if bed_temp is none or extruder_temp is none %}
    _Pre_Print_Procedure {rawparams}
  {% else %}
    _Pre_Print_Procedure BED_TEMP={bed_temp} EXTRUDER_TEMP={extruder_temp}{% if fila_type is not none %} FILA_TYPE={fila_type}{% endif %}{% if noz_dia is not none %} NOZ_DIA={noz_dia}{% endif %}{% if layer_h is not none %} LAYER_H={layer_h}{% endif %}{% if layer_c is not none %} LAYER_C={layer_c}{% endif %}{% if model_h is not none %} MODEL_H={model_h}{% endif %}{% if area_start is not none %} AREA_START={area_start}{% endif %}{% if area_end is not none %} AREA_END={area_end}{% endif %}
  {% endif %}

  SET_PRESSURE_ADVANCE ADVANCE={pressure_advance} SMOOTH_TIME={pa_smooth_time}
  {% if skew_profile is not none and skew_profile|string|lower != "off" %}
    SKEW_PROFILE LOAD={skew_profile}
    RESPOND TYPE=echo MSG="Skew-Profil aktiv: {skew_profile}"
  {% endif %}

  SAVE_VARIABLE VARIABLE=was_interrupted VALUE=True
  SAVE_VARIABLE VARIABLE=print_is_running_f VALUE=True
  SFS_ENABLE
  RESPOND TYPE=echo MSG="KPA_PRINT_START fertig"

[gcode_macro _BED_MESH_SMART]
description: Smart bed mesh selector for SV07 Plus
gcode:
  {% set mode = params.MODE|default("adaptive")|string|lower %}
  {% set adaptive = params.ADAPTIVE|default(1)|int %}
  {% set margin = params.ADAPTIVE_MARGIN|default(8)|float %}
  {% set objects = printer.exclude_object.objects|default([]) %}

  {% if mode == "off" or adaptive == 0 %}
    RESPOND TYPE=echo MSG="Bed Mesh: uebersprungen"
  {% elif mode == "calibrate" or adaptive == 2 %}
    RESPOND TYPE=echo MSG="Bed Mesh: Full-Mesh wird neu gemessen"
    BED_MESH_CALIBRATE
  {% elif mode == "default" %}
    RESPOND TYPE=echo MSG="Bed Mesh: Profil default geladen"
    BED_MESH_PROFILE LOAD=default
  {% elif objects|length > 0 %}
    RESPOND TYPE=echo MSG="Bed Mesh: Adaptive Mesh aktiv ({objects|length} Objekt(e), Margin {margin}mm)"
    BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN={margin}
  {% else %}
    RESPOND TYPE=echo MSG="Bed Mesh: keine Objektinfos - Profil default geladen"
    BED_MESH_PROFILE LOAD=default
  {% endif %}

[gcode_macro BED_MESH_FULL]
description: Recalibrate the complete bed mesh
gcode:
  _BED_MESH_SMART MODE=calibrate ADAPTIVE=2

[gcode_macro BED_MESH_DEFAULT]
description: Load the saved default bed mesh
gcode:
  _BED_MESH_SMART MODE=default ADAPTIVE=1

[gcode_macro BED_MESH_ADAPTIVE]
description: Recalibrate an adaptive bed mesh when object data is available
gcode:
  {% set margin = params.ADAPTIVE_MARGIN|default(8)|float %}
  _BED_MESH_SMART MODE=adaptive ADAPTIVE=1 ADAPTIVE_MARGIN={margin}

[gcode_macro MESH_STATUS]
description: Show active bed mesh and exclude-object status
gcode:
  {% set mesh = printer.bed_mesh %}
  {% set objects = printer.exclude_object.objects|default([]) %}
  RESPOND TYPE=echo MSG="Mesh aktiv: {mesh.profile_name|default('none')} / Objekte: {objects|length}"

[gcode_macro _PRINT_END_CORE]
description: Core end sequence
gcode:
  G31
  SAVE_VARIABLE VARIABLE=print_is_running_f VALUE=False
  clear_last_file
  SFS_DISABLE
  M400
  M83
  G92 E0

  {% if printer.extruder.can_extrude %}
    G1 E-2.0 F1800
  {% else %}
    {action_respond_info("Extruder zu kalt - End-Retract übersprungen")}
  {% endif %}

  {% if "xyz" in printer.toolhead.homed_axes %}
    G91
    G1 Z10 F900
    G90
    G1 X10 Y290 F6000
  {% else %}
    {action_respond_info("Drucker nicht gehomed - Präsentierposition übersprungen")}
  {% endif %}

  M107
  TURN_OFF_HEATERS
  SET_SKEW CLEAR=1
  BED_MESH_CLEAR
  CLEAR_PAUSE
  SET_PAUSE_NEXT_LAYER ENABLE=0
  SET_PAUSE_AT_LAYER ENABLE=0 LAYER=0
  M84 X Y E
  RESPOND TYPE=echo MSG="Finish Print!"

[gcode_macro PRINT_START]
description: Wrapper for KPA_PRINT_START
gcode:
  KPA_PRINT_START {rawparams}

[gcode_macro START_PRINT]
description: Alias for slicers using START_PRINT
gcode:
  PRINT_START {rawparams}

[gcode_macro PRINT_END]
description: Wrapper for _PRINT_END_CORE
gcode:
  _PRINT_END_CORE {rawparams}

[gcode_macro END_PRINT]
description: Alias for slicers using END_PRINT
gcode:
  PRINT_END {rawparams}

#############################################################################################################
# 50 - UTILITY / BEDIENUNG / KOMPATIBILITÄT
#############################################################################################################

[gcode_macro LOAD_FILAMENT]
description: Load filament with preheat if needed
gcode:
  {% set temp = params.TEMP|default(210)|float %}
  {% set length = params.LENGTH|default(50)|float %}
  {% set purge = params.PURGE|default(15)|float %}
  {% set speed_load = params.SPEED|default(300)|float %}
  {% set speed_purge = params.PURGE_SPEED|default(120)|float %}

  {% set sfs_switch_enabled = printer["filament_switch_sensor my_sensor"].enabled %}
  {% set sfs_motion_enabled = printer["filament_motion_sensor encoder_sensor"].enabled %}

  SAVE_GCODE_STATE NAME=load_filament_state
  SFS_DISABLE

  {% if printer.extruder.target < temp %}
    M104 S{temp}
  {% endif %}
  {% if not printer.extruder.can_extrude %}
    M109 S{temp}
  {% endif %}

  G91
  M83
  G1 E{length} F{speed_load}
  G1 E{purge} F{speed_purge}
  RESTORE_GCODE_STATE NAME=load_filament_state

  {% if sfs_switch_enabled %}
    SET_FILAMENT_SENSOR SENSOR=my_sensor ENABLE=1
  {% endif %}
  {% if sfs_motion_enabled %}
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=1
  {% endif %}

  RESPOND TYPE=echo MSG="PLA geladen (Temp {temp}°C)"

[gcode_macro UNLOAD_FILAMENT]
description: Unload filament with preheat if needed
gcode:
  {% set temp = params.TEMP|default(210)|float %}
  {% set push = params.PUSH|default(4)|float %}
  {% set pull_slow = params.PULL_SLOW|default(15)|float %}
  {% set pull_fast = params.LENGTH|default(70)|float %}
  {% set speed_push = params.PUSH_SPEED|default(180)|float %}
  {% set speed_slow = params.SLOW_SPEED|default(180)|float %}
  {% set speed_fast = params.FAST_SPEED|default(900)|float %}

  {% set sfs_switch_enabled = printer["filament_switch_sensor my_sensor"].enabled %}
  {% set sfs_motion_enabled = printer["filament_motion_sensor encoder_sensor"].enabled %}

  SAVE_GCODE_STATE NAME=unload_filament_state
  SFS_DISABLE

  {% if printer.extruder.target < temp %}
    M104 S{temp}
  {% endif %}
  {% if not printer.extruder.can_extrude %}
    M109 S{temp}
  {% endif %}

  G91
  M83
  G1 E{push} F{speed_push}
  G1 E-{pull_slow} F{speed_slow}
  G1 E-{pull_fast} F{speed_fast}
  RESTORE_GCODE_STATE NAME=unload_filament_state

  {% if sfs_switch_enabled %}
    SET_FILAMENT_SENSOR SENSOR=my_sensor ENABLE=1
  {% endif %}
  {% if sfs_motion_enabled %}
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=1
  {% endif %}

  RESPOND TYPE=echo MSG="PLA entladen (Temp {temp}°C)"

[gcode_macro M600]
description: Filament change / color change helper
gcode:
  {% set temp = params.TEMP|default(0)|float %}
  {% if temp > 0 %}
    M104 S{temp}
  {% endif %}
  RESPOND TYPE=echo MSG="M600: Filamentwechsel angefordert"
  PAUSE

[gcode_macro LED_ON]
description: Turn the LED on
gcode:
  SET_PIN PIN=my_led VALUE=1.0

[gcode_macro LED_OFF]
description: Turn the LED off
gcode:
  SET_PIN PIN=my_led VALUE=0.0

[gcode_macro BEEP]
description: Play a beep pattern via shell script
gcode:
  {% set beep_count = params.BC|default('3') %}
  {% set beep_duration = params.BD|default('0.2') %}
  {% set pause_duration = params.PD|default('1') %}
  RUN_SHELL_COMMAND CMD=beep PARAMS='{beep_count} {beep_duration} {pause_duration}'

[gcode_macro update_git]
description: Run the klipper-backup script with an optional message
gcode:
  {% set message = params.MESSAGE|default() %}
  {% if message %}
    RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
  {% else %}
    RUN_SHELL_COMMAND CMD=update_git_script
  {% endif %}

[gcode_macro SAFE_Z_DOWN]
description: Lower Z only when Z is homed
gcode:
  {% set move = params.Z|default(5)|float %}
  {% set speed = params.F|default(900)|float %}
  {% set homed = printer.toolhead.homed_axes %}

  {% if "z" not in homed %}
    {action_respond_info("Z ist nicht gehome't. Erst G28 ausführen.")}
  {% else %}
    SAVE_GCODE_STATE NAME=SAFE_Z_DOWN_state
    G91
    G1 Z-{move} F{speed}
    RESTORE_GCODE_STATE NAME=SAFE_Z_DOWN_state
  {% endif %}

[gcode_macro PROBE_ACCURACY_CHECK]
description: Home and run probe accuracy, optionally after bed heat soak
gcode:
  {% set samples = params.SAMPLES|default(10)|int %}
  {% set bed_temp = params.BED_TEMP|default(0)|float %}
  {% set soak_minutes = params.SOAK_MINUTES|default(0)|float %}
  {% if bed_temp > 0 %}
    M140 S{bed_temp}
    M190 S{bed_temp}
    {% if soak_minutes > 0 %}
      RESPOND TYPE=echo MSG="Probe-Test: Bett wartet {soak_minutes} Minuten bei {bed_temp}C"
      G4 P{(soak_minutes * 60000)|int}
    {% endif %}
  {% endif %}
  G28
  PROBE_ACCURACY SAMPLES={samples}

[gcode_macro SCREWS_TILT_CHECK]
description: Home and run screws tilt with an optional max deviation
gcode:
  {% set max_deviation = params.MAX_DEVIATION|default(0.05)|float %}
  G28
  SCREWS_TILT_CALCULATE MAX_DEVIATION={max_deviation}

[gcode_macro INPUT_SHAPER_RECALIBRATE]
description: Measure ADXL noise and recalibrate both input shaper axes
gcode:
  {% set save = params.SAVE|default(0)|int %}
  G28
  MEASURE_AXES_NOISE
  SHAPER_CALIBRATE AXIS=X
  SHAPER_CALIBRATE AXIS=Y
  {% if save == 1 %}
    SAVE_CONFIG
  {% else %}
    RESPOND TYPE=echo MSG="Input Shaper gemessen. Ergebnis pruefen, dann SAVE_CONFIG ausfuehren."
  {% endif %}

[gcode_macro AXIS_TWIST_CALIBRATE]
description: Start manual X axis twist calibration with 5-9 sample points
gcode:
  {% set samples = params.SAMPLES|default(7)|int %}
  {% set samples = 5 if samples < 5 else 9 if samples > 9 else samples %}
  G28
  AXIS_TWIST_COMPENSATION_CALIBRATE SAMPLE_COUNT={samples}

[gcode_macro SAVE_XY_SKEW_PROFILE]
description: Calculate and save an XY skew profile from measured calibration-object diagonals
gcode:
  {% set profile = params.PROFILE|default("sv07plus_xy")|string %}
  {% if params.AC is not defined or params.BD is not defined or params.AD is not defined %}
    RESPOND TYPE=error MSG="Erforderlich: SAVE_XY_SKEW_PROFILE AC=<Diagonal1> BD=<Diagonal2> AD=<Seite> [PROFILE=sv07plus_xy]"
  {% else %}
    SET_SKEW XY={params.AC|float},{params.BD|float},{params.AD|float}
    SKEW_PROFILE SAVE={profile}
    RESPOND TYPE=echo MSG="Skew-Profil {profile} berechnet. Danach SAVE_CONFIG ausfuehren."
  {% endif %}

[gcode_macro M205]
description: Compatibility macro
gcode:
  RESPOND TYPE=echo MSG="M205 wird ignoriert"

[gcode_macro M900]
description: Marlin compatibility for pressure advance
gcode:
  {% if 'K' in params and 'S' in params %}
    SET_PRESSURE_ADVANCE ADVANCE={params.K} SMOOTH_TIME={params.S}
    RESPOND TYPE=echo MSG="Pressure Advance={params.K}, Smooth Time={params.S}"
  {% elif 'K' in params %}
    SET_PRESSURE_ADVANCE ADVANCE={params.K}
    RESPOND TYPE=echo MSG="Pressure Advance={params.K}"
  {% else %}
    RESPOND TYPE=echo MSG="M900 ohne K-Wert aufgerufen"
  {% endif %}

[gcode_macro M486]
description: Marlin object exclusion compatibility for slicers
gcode:
  {% if 'T' in params %}
    EXCLUDE_OBJECT RESET=1
  {% endif %}
  {% if 'U' in params %}
    EXCLUDE_OBJECT_DEFINE RESET=1
  {% endif %}
  {% if 'P' in params %}
    EXCLUDE_OBJECT_DEFINE NAME={params.P}
  {% endif %}
  {% if 'S' in params %}
    {% if params.S == '-1' %}
      {% if printer.exclude_object.current_object|default("") %}
        EXCLUDE_OBJECT_END NAME={printer.exclude_object.current_object}
      {% endif %}
    {% else %}
      EXCLUDE_OBJECT_START NAME={params.S}
    {% endif %}
  {% endif %}
  {% if 'C' in params %}
    EXCLUDE_OBJECT NAME={params.C}
  {% endif %}

[gcode_arcs]
resolution: 0.5

