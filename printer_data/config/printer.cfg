[probe]
pin: PD13
x_offset: 27
y_offset: -20
speed: 10
lift_speed: 35
samples: 3
samples_result: median
samples_tolerance: 0.015
samples_tolerance_retries: 5

[filament_switch_sensor my_sensor]
switch_pin: PD11
pause_on_runout: False
event_delay: 3.0
pause_delay: 0.5
runout_gcode:
  RESPOND TYPE=error MSG="⚠️ Filament-Switch: Kein Filament erkannt!"
  BEEP BC=3
  PAUSE
insert_gcode:
  RESPOND TYPE=echo MSG="✅ Filament-Switch: Filament erkannt."

[filament_motion_sensor encoder_sensor]
switch_pin: ^PB14
detection_length: 13.0
extruder: extruder
pause_on_runout: False
runout_gcode:
  RESPOND TYPE=error MSG="⚠️ Motion-Sensor: Filament bewegt sich nicht mehr! (Verstopfung?)"
  BEEP BC=5
  PAUSE
insert_gcode:
  RESPOND TYPE=echo MSG="✅ Motion-Sensor: Bewegung erkannt."

[delayed_gcode DISABLE_SFS_AT_STARTUP]
initial_duration: 1.0
gcode:
  SET_FILAMENT_SENSOR SENSOR=my_sensor ENABLE=0
  SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0

[gcode_macro SFS_ENABLE]
description: Enable BTT SFS V2.0
gcode:
  SET_FILAMENT_SENSOR SENSOR=my_sensor ENABLE=1
  SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=1
  RESPOND TYPE=echo MSG="SFS V2.0 aktiviert"

[gcode_macro SFS_DISABLE]
description: Disable BTT SFS V2.0
gcode:
  SET_FILAMENT_SENSOR SENSOR=my_sensor ENABLE=0
  SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0
  RESPOND TYPE=echo MSG="SFS V2.0 deaktiviert"

