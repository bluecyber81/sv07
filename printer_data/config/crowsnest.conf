#### crowsnest.conf
#### Cleaned version with identical active camera settings.
#### Adjust only if your webcam path, resolution or stream mode changes.

[crowsnest]
log_path: /home/mks/printer_data/logs/crowsnest.log
log_level: verbose
delete_log: false
no_proxy: false

[cam sv07]
mode: ustreamer
enable_rtsp: true
rtsp_port: 8554
port: 8080
device: /dev/v4l/by-id/usb-046d_HD_Pro_Webcam_C920_0615B61F-video-index0
resolution: 1920x1080
max_fps: 30
custom_flags: --allow-truncated-frames
v4l2ctl: focus_automatic_continuous=0,focus_absolute=30,power_line_frequency=1
