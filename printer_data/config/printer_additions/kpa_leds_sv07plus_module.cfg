# KPA LED module for Sovol SV07 Plus + Klipad50
#
# Zweck:
# - separates LED-Modul fuer KPA / Klipper
# - keine Aenderungen in den KPA-Dateien noetig
# - zeigt LED-Phasen fuer Homing, KPAD_ZTILT, manuelles Mesh, Probe/Z-Offset und Schrauben-Kalibrierung
# - Z_TILT_ADJUST wird bewusst nicht ueberschrieben, damit die KPA-Schutzlogik aktiv bleibt.
# - BED_MESH_CALIBRATE wird bewusst nicht direkt gewrappt, damit das KPA
#   Bed-Mesh-Area-Modul AREA_START/AREA_END fuer adaptive Meshes auswerten kann.
#
# WICHTIG:
# 1) Diese Datei erst NACH allen relevanten Drucker-Sektionen einbinden,
#    also am besten ganz unten in printer.cfg, kurz VOR dem SAVE_CONFIG-Block.
# 2) Falls in printer.cfg bereits diese Makros existieren, muessen sie entfernt
#    oder auskommentiert werden, sonst gibt es doppelte Sektionen:
#       [gcode_macro KPAD_LED_STATE]
#       [gcode_macro _KPAD_LED_PHASE]
#       [gcode_macro KPAD_LED_IDLE]
#       [gcode_macro KPAD_HOME]
#       [gcode_macro KPAD_ZTILT]
#       [gcode_macro KPAD_MESH]
#       [gcode_macro KPAD_ZOFFSET]
#       [gcode_macro KPAD_SCREWS]
# 3) Passend zu der Python-Datei klipper_leds.py, die den Status aus
#    [gcode_macro KPAD_LED_STATE] ausliest.
#
# Empfohlener Include in printer.cfg:
#   [include printer_additions/kpa_leds_sv07plus_module.cfg]
#
# Empfohlene Position:
# - ganz unten in printer.cfg
# - direkt vor dem automatisch erzeugten SAVE_CONFIG-Block

[gcode_macro KPAD_LED_STATE]
variable_phase: "idle"
gcode:

[gcode_macro _KPAD_LED_PHASE]
description: Interne LED-Phase fuer Klipad50 setzen
gcode:
  {% set phase = params.PHASE|default("idle")|lower %}
  SET_GCODE_VARIABLE MACRO=KPAD_LED_STATE VARIABLE=phase VALUE='"{phase}"'

[gcode_macro KPAD_LED_IDLE]
description: LED-Phase manuell auf idle zuruecksetzen
gcode:
  _KPAD_LED_PHASE PHASE=idle

[delayed_gcode KPAD_LED_INIT]
initial_duration: 1.0
gcode:
  _KPAD_LED_PHASE PHASE=idle

[gcode_macro G28]
rename_existing: G0028
description: Wrapper fuer Homing mit LED-Phase
gcode:
  _KPAD_LED_PHASE PHASE=homing
  G0028 {rawparams}
  _KPAD_LED_PHASE PHASE=idle

[gcode_macro PROBE_CALIBRATE]
rename_existing: PROBE_CALIBRATE_KPAD_BASE
description: Wrapper fuer PROBE_CALIBRATE mit LED-Phase
gcode:
  _KPAD_LED_PHASE PHASE=zoffset
  PROBE_CALIBRATE_KPAD_BASE {rawparams}
  _KPAD_LED_PHASE PHASE=idle

[gcode_macro SCREWS_TILT_CALCULATE]
rename_existing: SCREWS_TILT_CALCULATE_KPAD_BASE
description: Wrapper fuer SCREWS_TILT_CALCULATE mit LED-Phase
gcode:
  _KPAD_LED_PHASE PHASE=screws
  SCREWS_TILT_CALCULATE_KPAD_BASE {rawparams}
  _KPAD_LED_PHASE PHASE=idle

[gcode_macro KPAD_HOME]
description: Optionales manuelles Homing-Makro
gcode:
  G28 {rawparams}

[gcode_macro KPAD_ZTILT]
description: Optionales manuelles Z-Tilt-Makro mit LED-Phase, ohne Z_TILT_ADJUST zu ueberschreiben
gcode:
  _KPAD_LED_PHASE PHASE=ztilt
  Z_TILT_ADJUST {rawparams}
  _KPAD_LED_PHASE PHASE=idle

[gcode_macro KPAD_MESH]
description: Optionales manuelles Mesh-Makro
gcode:
  _KPAD_LED_PHASE PHASE=mesh
  BED_MESH_CALIBRATE {rawparams}
  _KPAD_LED_PHASE PHASE=idle

[gcode_macro KPAD_ZOFFSET]
description: Optionales manuelles Z-Offset-Makro
gcode:
  PROBE_CALIBRATE {rawparams}

[gcode_macro KPAD_SCREWS]
description: Optionales manuelles Schrauben-Kalibrierungs-Makro
gcode:
  SCREWS_TILT_CALCULATE {rawparams}
